output_dir: outputs
max_examples: 2 # start small to smoke-test cost and wiring

domain:
  name: math_word_problems

loop:
  max_rounds: 3
  weak_samples: 2
  strong_samples: 2
  stop_on_first_accept: true

orchestrator:
  provider_model: azure/gpt-5.4-nano

challenger:
  provider_model: azure/gpt-5.4-nano

weak_solver:
  provider_model: gemini/gemini-3.1-flash-lite-preview

strong_solver:
  provider_model: azure/gpt-5.4-nano

judge:
  provider_model: azure/gpt-5.4-nano

request_timeout_s: 60
max_retries: 3

# Real-provider example: QA-from-documents.
# Requires OPENAI_API_KEY (and/or ANTHROPIC_API_KEY) in your environment.

output_dir: outputs
max_examples: 20

domain:
  name: qa_from_documents
  params:
    source_dir: ./my_corpus
    glob: "**/*.md"
    max_chars: 12000

loop:
  max_rounds: 5
  weak_samples: 3
  strong_samples: 3
  stop_on_first_accept: true

acceptance:
  weak_avg_max: 0.65
  weak_max_max: 0.75
  forbid_weak_zero: true
  strong_avg_min: 0.60
  strong_avg_max: 0.95
  min_gap: 0.20
  require_quality_passed: true
  rubric_max_weight: 7

orchestrator:
  provider_model: anthropic/claude-haiku-4-5
  temperature: 0.2

challenger:
  provider_model: anthropic/claude-haiku-4-5
  temperature: 0.8

weak_solver:
  provider_model: openai/gpt-4o-mini
  temperature: 0.7

strong_solver:
  provider_model: openai/gpt-4o
  temperature: 0.3

judge:
  provider_model: anthropic/claude-haiku-4-5
  temperature: 0.0

request_timeout_s: 60
max_retries: 3

safety:
  enabled: true   # uses the conservative built-in PII heuristics

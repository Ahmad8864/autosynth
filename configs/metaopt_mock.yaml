# Offline meta-optimization demo using the scripted `mock/metaopt` scenario.
# It exercises mutation and acceptance without API keys.

run_id: metaopt-mock-demo
output_dir: outputs
max_examples: 8

domain:
  name: qa_from_documents
  params:
    source_dir: examples/sample_docs
    glob: "**/*.md"

loop:
  max_rounds: 2
  weak_samples: 2
  strong_samples: 2

acceptance:
  weak_avg_max: 0.65
  weak_max_max: 0.75
  forbid_weak_zero: false
  strong_avg_min: 0.60
  strong_avg_max: 0.95
  min_gap: 0.20
  require_quality_passed: true

orchestrator:  { provider_model: mock/metaopt }
challenger:    { provider_model: mock/metaopt }
weak_solver:   { provider_model: mock/metaopt }
strong_solver: { provider_model: mock/metaopt }
judge:         { provider_model: mock/metaopt }

metaopt:
  enabled: true
  max_iterations: 4
  boltzmann_temp: 0.1
  train_size: 1
  val_size: 1
  inner_max_rounds: 2
  mutator: { provider_model: mock/metaopt }

# Real-provider example: math word problems.
# Demonstrates a non-document domain.

output_dir: outputs
max_examples: 10

domain:
  name: math_word_problems
  params:
    topics:
      - { topic: linear systems, difficulty: high-school }
      - { topic: modular arithmetic, difficulty: competition }
      - { topic: probability with conditional events, difficulty: high-school }

loop:
  max_rounds: 4
  weak_samples: 4
  strong_samples: 4
  stop_on_first_accept: true

acceptance:
  mode: verifiable
  verifiable_weak_max_correct: 1
  verifiable_strong_min_correct: 3

# Mix providers freely
orchestrator:  { provider_model: openai/gpt-4o-mini,                temperature: 0.2 }
challenger:    { provider_model: anthropic/claude-haiku-4-5,        temperature: 0.9 }
weak_solver:   { provider_model: together_ai/meta-llama/Llama-3.2-3B-Instruct, temperature: 0.6 }
strong_solver: { provider_model: openai/gpt-4o,                     temperature: 0.2 }
judge:         { provider_model: anthropic/claude-haiku-4-5,        temperature: 0.0 }
